name: Deploy

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: deploy-production
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy over SSH
                uses: appleboy/ssh-action@v1.2.0
                with:
                    host: ${{ secrets.SSH_HOST }}
                    port: ${{ secrets.SSH_PORT }}
                    username: ${{ secrets.SSH_USER }}
                    key: ${{ secrets.SSH_KEY }}
                    script_stop: true
                    script: |
                        APP_DIR="${{ secrets.APP_DIR }}" PM2_NAME="${{ secrets.PM2_NAME }}" bash ${{ secrets.APP_DIR }}/deploy.sh
